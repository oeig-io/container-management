# iDempiere Container Configuration
# Used by launch.sh to create and configure iDempiere containers

# Container naming
PREFIX="id"

# Port configuration
# Final port = PORT_BASE + container_number (e.g., id-47 -> 9047)
PORT_BASE=9000
CONNECT_PORT=443

# Resource limits
MEMORY="4GiB"
CPU=2
DISK="20GiB"

# Pre-seed configuration (optional)
# Set SEED_FILE="" to skip pre-seeding
SEED_DIR="/opt/idempiere-seed"
SEED_FILE="idempiereServer12Daily.gtk.linux.x86_64.zip"

# Installation paths
INSTALL_PATH="/opt/idempiere-install"
INSTALLER_REPO="../idempiere-container"

# Health check configuration
HEALTH_ENDPOINT="http://localhost:8080/api/v1/auth/tokens"
HEALTH_EXPECTED=405
HEALTH_TIMEOUT=90
HEALTH_INTERVAL=5
