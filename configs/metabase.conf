# Metabase Container Configuration
# Used by launch.sh to create and configure Metabase containers

# Container naming
PREFIX="mb"

# Port configuration
# Final port = PORT_BASE + container_number (e.g., mb-01 -> 9101)
PORT_BASE=9100
CONNECT_PORT=3000

# Resource limits
MEMORY="4GiB"
CPU=2
DISK="20GiB"

# Pre-seed configuration (optional)
# Set SEED_FILE="" to skip pre-seeding
SEED_DIR="/opt/metabase-seed"
SEED_FILE=""

# Installation paths
INSTALL_PATH="/opt/metabase-install"
INSTALLER_REPO="../install-metabase"

# Health check configuration
HEALTH_ENDPOINT="http://localhost:3000/api/health"
HEALTH_EXPECTED=200
HEALTH_TIMEOUT=60
HEALTH_INTERVAL=5
