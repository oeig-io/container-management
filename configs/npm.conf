# NPM Prerequisites Container Configuration
# Used by launch.sh to create and configure NPM/Node.js containers
# Provides nodejs and npm for installing global npm packages

# Container naming
PREFIX="npm"

# Port configuration
# NPM doesn't run a service, so no port needed
# Setting these to placeholder values required by launch.sh
PORT_BASE=0
CONNECT_PORT=0

# NixOS image - use unstable
NIXOS_IMAGE="images:nixos/unstable"

# Resource limits - minimal for just npm prerequisites
# Actual resources depend on packages installed later
MEMORY="1GiB"
CPU=1
DISK="5GiB"

# Pre-seed configuration (not needed)
SEED_DIR=""
SEED_FILE=""

# Installation paths
INSTALL_PATH="/opt/npm-install"
INSTALLER_REPO="../install-npm"

# Health check configuration (not needed - no service)
HEALTH_ENDPOINT=""
HEALTH_EXPECTED=0
HEALTH_TIMEOUT=0
HEALTH_INTERVAL=0
