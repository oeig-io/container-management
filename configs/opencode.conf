# OpenCode Container Configuration
# Used by launch.sh to create and configure OpenCode containers
# Uses NixOS unstable to get latest opencode from nixpkgs

# Container naming
PREFIX="oc"

# Port configuration
# Final port = PORT_BASE + container_number (e.g., oc-01 -> 9201)
PORT_BASE=9200
CONNECT_PORT=4096

# NixOS image - use unstable for latest opencode package
NIXOS_IMAGE="nixos/unstable"

# Resource limits
MEMORY="4GiB"
CPU=2
DISK="20GiB"

# Pre-seed configuration (not needed - opencode is in nixpkgs)
SEED_DIR="/opt/opencode-seed"
SEED_FILE=""

# Installation paths
INSTALL_PATH="/opt/opencode-install"
INSTALLER_REPO="../install-opencode"

# Health check configuration
HEALTH_ENDPOINT="http://localhost:4096/"
HEALTH_EXPECTED=200
HEALTH_TIMEOUT=30
HEALTH_INTERVAL=5
